version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: quizz_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5434:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d quizz_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: evgvira/backend:latest
    ports:
      - '8081:8081'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/quizz_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: evgvira/frontend:latest
    ports:
      - 80:80
    depends_on:
      - backend
volumes:
  postgres_data: